<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="0" fill="#f5f0eb"/>

  <!-- Annie - German Wirehaired Pointer silhouette/illustration -->
  <!-- Body -->
  <g transform="translate(256, 200)">
    <!-- Head shape -->
    <ellipse cx="0" cy="-20" rx="52" ry="48" fill="#6b5040"/>
    <!-- Snout -->
    <ellipse cx="0" cy="18" rx="32" ry="22" fill="#7d6252"/>
    <!-- Beard/mustache (GWP signature feature) -->
    <ellipse cx="0" cy="32" rx="26" ry="14" fill="#8b7565"/>
    <ellipse cx="-12" cy="26" rx="14" ry="10" fill="#8b7565"/>
    <ellipse cx="12" cy="26" rx="14" ry="10" fill="#8b7565"/>
    <!-- Nose -->
    <ellipse cx="0" cy="12" rx="12" ry="9" fill="#2c2417"/>
    <ellipse cx="0" cy="10" rx="4" ry="2.5" fill="#4a3828" opacity="0.4"/>
    <!-- Eyes -->
    <ellipse cx="-18" cy="-28" rx="9" ry="10" fill="#2c2417"/>
    <ellipse cx="18" cy="-28" rx="9" ry="10" fill="#2c2417"/>
    <!-- Eye shine -->
    <circle cx="-15" cy="-30" r="3" fill="white" opacity="0.7"/>
    <circle cx="21" cy="-30" r="3" fill="white" opacity="0.7"/>
    <!-- Eyebrows (GWP bushy brows) -->
    <ellipse cx="-18" cy="-40" rx="14" ry="5" fill="#5d4535"/>
    <ellipse cx="18" cy="-40" rx="14" ry="5" fill="#5d4535"/>
    <!-- Ears (floppy) -->
    <ellipse cx="-48" cy="-12" rx="18" ry="32" fill="#5d4535" transform="rotate(-15, -48, -12)"/>
    <ellipse cx="48" cy="-12" rx="18" ry="32" fill="#5d4535" transform="rotate(15, 48, -12)"/>
    <!-- Ear inner -->
    <ellipse cx="-48" cy="-8" rx="12" ry="22" fill="#7d6252" transform="rotate(-15, -48, -8)"/>
    <ellipse cx="48" cy="-8" rx="12" ry="22" fill="#7d6252" transform="rotate(15, 48, -8)"/>
    <!-- Top of head texture (wiry fur) -->
    <ellipse cx="0" cy="-55" rx="30" ry="12" fill="#5d4535"/>
    <!-- Mouth line -->
    <path d="M-8 22 Q0 28 8 22" stroke="#4a3828" stroke-width="1.5" fill="none"/>
    <!-- Tongue (happy dog!) -->
    <ellipse cx="4" cy="28" rx="6" ry="10" fill="#d4756a"/>
  </g>

  <!-- Collar -->
  <rect x="228" y="238" width="56" height="10" rx="3" fill="#c0622e"/>
  <circle cx="256" cy="250" r="5" fill="#d4a020"/>

  <!-- FenceTrace text -->
  <text x="256" y="330" font-size="42" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="800" fill="#2c2417" text-anchor="middle" letter-spacing="-1">
    Fence<tspan fill="#c0622e">Trace</tspan>
  </text>

  <!-- Tagline -->
  <text x="256" y="360" font-size="14" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="500" fill="#6b6052" text-anchor="middle" letter-spacing="0.5">
    Satellite fence estimates
  </text>

  <!-- Small fence silhouette at bottom -->
  <g transform="translate(256, 420)" opacity="0.2">
    <rect x="-100" y="0" width="6" height="30" fill="#2c2417"/>
    <rect x="-70" y="4" width="6" height="26" fill="#2c2417"/>
    <rect x="-40" y="0" width="6" height="30" fill="#2c2417"/>
    <rect x="-10" y="4" width="6" height="26" fill="#2c2417"/>
    <rect x="20" y="0" width="6" height="30" fill="#2c2417"/>
    <rect x="50" y="4" width="6" height="26" fill="#2c2417"/>
    <rect x="80" y="0" width="6" height="30" fill="#2c2417"/>
    <polygon points="-100,0 -97,-10 -94,0" fill="#2c2417"/>
    <polygon points="-70,4 -67,-6 -64,4" fill="#2c2417"/>
    <polygon points="-40,0 -37,-10 -34,0" fill="#2c2417"/>
    <polygon points="-10,4 -7,-6 -4,4" fill="#2c2417"/>
    <polygon points="20,0 23,-10 26,0" fill="#2c2417"/>
    <polygon points="50,4 53,-6 56,4" fill="#2c2417"/>
    <polygon points="80,0 83,-10 86,0" fill="#2c2417"/>
    <rect x="-104" y="8" width="192" height="4" rx="1" fill="#2c2417"/>
    <rect x="-104" y="20" width="192" height="4" rx="1" fill="#2c2417"/>
  </g>
</svg>
