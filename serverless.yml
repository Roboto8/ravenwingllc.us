org: portertoddc
service: ravenwingllc

custom:
  bucketMap:
    dev: 'ravenwingllc-frontend-dev'
    prod: 'ravenwing-frontend'
  folderMap:
    dev: 'client/preview'
    prod: 'client/dist'
  client:
    bucketName: ${self:custom.bucketMap.${sls:stage}}
    distributionFolder: ${self:custom.folderMap.${sls:stage}}
    # Explicit Cache-Control per asset class. Without it S3 serves no header
    # and browsers cache heuristically (stale HTML/CSS under new deploys; on
    # skullbash the same gap produced an infinite reload loop with the SW).
    # Exact-file keys only: serverless-finch folder keys must end with the OS
    # path separator and glob keys mis-match backslash paths, so neither is
    # reliable when deploying from Windows. When adding a NEW js/css/html
    # file, add its key here too (and reference js/css with a fresh ?v=).
    objectHeaders:
      ALL_OBJECTS:
        - name: Cache-Control
          value: public, max-age=86400
      index.html:
        - name: Cache-Control
          value: no-cache
      landing.html:
        - name: Cache-Control
          value: no-cache
      approve.html:
        - name: Cache-Control
          value: no-cache
      terms.html:
        - name: Cache-Control
          value: no-cache
      privacy.html:
        - name: Cache-Control
          value: no-cache
      refund.html:
        - name: Cache-Control
          value: no-cache
      eula.html:
        - name: Cache-Control
          value: no-cache
      compare-fence-lead-costs.html:
        - name: Cache-Control
          value: no-cache
      sw.js:
        - name: Cache-Control
          value: no-cache
      manifest.json:
        - name: Cache-Control
          value: no-cache
      robots.txt:
        - name: Cache-Control
          value: no-cache
      sitemap.xml:
        - name: Cache-Control
          value: no-cache
      .well-known/assetlinks.json:
        - name: Cache-Control
          value: no-cache
      js/app.js:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
      js/api.js:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
      js/auth.js:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
      js/bom.js:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
      js/config.js:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
      js/i18n.js:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
      js/regions.js:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
      css/app.css:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
      css/style.css:
        - name: Cache-Control
          value: public, max-age=31536000, immutable
  tableName: fencecalc-${sls:stage}
  assetsBucket: fencecalc-assets-${sls:stage}

package:
  excludeDevDependencies: true
  patterns:
    - '!android/**'
    - '!client/**'
    - '!tests/**'
    - '!coverage/**'
    # outreach/ holds Gmail OAuth secrets on homebase — must NEVER enter a zip
    - '!outreach/**'
    # .env holds local credentials (the framework excludes dotenv files by
    # default, but never rely on a default for a secret)
    - '!.env*'
    - '!docs/**'
    - '!.claude/**'
    - '!*.md'
    - '!node_modules/.bin/**'
    - '!node_modules/*/test/**'
    - '!node_modules/*/tests/**'
    - '!node_modules/*/docs/**'
    - '!node_modules/**/README*'
    - '!node_modules/**/*.md'
    - '!node_modules/**/*.d.ts'
    - '!node_modules/**/LICENSE*'
    - '!node_modules/**/CHANGELOG*'
    - '!.serverless/**'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  timeout: 15
  # Lambda logs expire instead of accumulating forever (cost + data hygiene;
  # matches the retention posture in the privacy policy). Existing groups were
  # stamped via put-retention-policy on 2026-06-11.
  logRetentionInDays: 90

  stackTags:
    Project: RavenWingLLC
    OwnerContact: Porter

  deploymentBucket:
    name: "ravenwingllc-deployment"
    serverSideEncryption: AES256

  environment:
    DYNAMODB_TABLE: ${self:custom.tableName}
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
    ASSETS_BUCKET: ${self:custom.assetsBucket}
    STRIPE_SECRET_KEY: ${ssm:fencecalc.${sls:stage}.stripe-secret-key, ''}
    STRIPE_WEBHOOK_SECRET: ${ssm:fencecalc.${sls:stage}.stripe-webhook-secret, ''}
    STRIPE_PRICE_ID: ${ssm:fencecalc.${sls:stage}.stripe-price-id, ''}
    STRIPE_PRICE_PRO: ${ssm:fencecalc.${sls:stage}.stripe-price-pro, ''}
    STRIPE_PRICE_BUILDER: ${ssm:fencecalc.${sls:stage}.stripe-price-builder, ''}
    STRIPE_PRICE_CONTRACTOR: ${ssm:fencecalc.${sls:stage}.stripe-price-contractor, ''}
    FORWARD_TO_EMAIL: ${ssm:fencecalc.${sls:stage}.forward-to-email, 'portertoddc@gmail.com'}
    EMAIL_BUCKET: fencetrace-email-us-east-1

  httpApi:
    throttle:
      burstLimit: 50
      rateLimit: 100
    cors:
      allowedOrigins:
        - 'https://fencetrace.com'
        - 'https://www.fencetrace.com'
        - 'http://ravenwingllc-frontend-dev.s3-website-us-east-1.amazonaws.com'
        - 'http://ravenwing-frontend.s3-website-us-east-1.amazonaws.com'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}'
        audience:
          - !Ref CognitoUserPoolClient

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt FenceCalcTable.Arn
            - !Sub '${FenceCalcTable.Arn}/index/*'
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - !Sub 'arn:aws:s3:::${self:custom.assetsBucket}/*'
            - 'arn:aws:s3:::fencetrace-email-us-east-1/*'
        - Effect: Allow
          Action:
            - ses:SendRawEmail
            - ses:SendEmail
          Resource:
            - !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/fencetrace.com'
            - !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*.fencetrace.com'

functions:
  postConfirmation:
    handler: handlers/auth.postConfirmation
    events:
      - cognitoUserPool:
          pool: fencecalc-${sls:stage}
          trigger: PostConfirmation
          existing: true
          forceDeploy: true

  getCompany:
    handler: handlers/company.get
    events:
      - httpApi:
          path: /api/company
          method: GET
          authorizer:
            name: cognitoAuthorizer

  updateCompany:
    handler: handlers/company.update
    events:
      - httpApi:
          path: /api/company
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  listEstimates:
    handler: handlers/estimates.list
    events:
      - httpApi:
          path: /api/estimates
          method: GET
          authorizer:
            name: cognitoAuthorizer

  createEstimate:
    handler: handlers/estimates.create
    events:
      - httpApi:
          path: /api/estimates
          method: POST
          authorizer:
            name: cognitoAuthorizer

  getEstimate:
    handler: handlers/estimates.get
    events:
      - httpApi:
          path: /api/estimates/{id}
          method: GET
          authorizer:
            name: cognitoAuthorizer

  updateEstimate:
    handler: handlers/estimates.update
    events:
      - httpApi:
          path: /api/estimates/{id}
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  deleteEstimate:
    handler: handlers/estimates.remove
    events:
      - httpApi:
          path: /api/estimates/{id}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  trashEstimates:
    handler: handlers/estimates.trash
    events:
      - httpApi:
          path: /api/estimates/trash
          method: GET
          authorizer:
            name: cognitoAuthorizer

  restoreEstimate:
    handler: handlers/estimates.restore
    events:
      - httpApi:
          path: /api/estimates/{id}/restore
          method: POST
          authorizer:
            name: cognitoAuthorizer

  purgeEstimate:
    handler: handlers/estimates.purge
    events:
      - httpApi:
          path: /api/estimates/{id}/purge
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  shareEstimate:
    handler: handlers/approval.share
    events:
      - httpApi:
          path: /api/estimates/{id}/share
          method: POST
          authorizer:
            name: cognitoAuthorizer

  getPublicEstimate:
    handler: handlers/approval.getPublic
    events:
      - httpApi:
          path: /api/public/estimate/{token}
          method: GET

  respondEstimate:
    handler: handlers/approval.respond
    events:
      - httpApi:
          path: /api/public/estimate/{token}/respond
          method: POST

  getPublicCompany:
    handler: handlers/leads.getPublicCompany
    events:
      - httpApi:
          path: /api/public/company/{id}
          method: GET

  createPublicLead:
    handler: handlers/leads.createLead
    events:
      - httpApi:
          path: /api/public/lead
          method: POST

  billingCheckout:
    handler: handlers/billing.checkout
    events:
      - httpApi:
          path: /api/billing/checkout
          method: POST
          authorizer:
            name: cognitoAuthorizer

  billingPortal:
    handler: handlers/billing.portal
    events:
      - httpApi:
          path: /api/billing/portal
          method: POST
          authorizer:
            name: cognitoAuthorizer

  billingStatus:
    handler: handlers/billing.status
    events:
      - httpApi:
          path: /api/billing/status
          method: GET
          authorizer:
            name: cognitoAuthorizer

  billingShareBonus:
    handler: handlers/billing.shareBonus
    events:
      - httpApi:
          path: /api/billing/share-bonus
          method: POST
          authorizer:
            name: cognitoAuthorizer
  billingExport:
    handler: handlers/billing.exportData
    events:
      - httpApi:
          path: /api/billing/export
          method: GET
          authorizer:
            name: cognitoAuthorizer

  listTeam:
    handler: handlers/team.list
    events:
      - httpApi:
          path: /api/team
          method: GET
          authorizer:
            name: cognitoAuthorizer

  inviteTeam:
    handler: handlers/team.invite
    events:
      - httpApi:
          path: /api/team/invite
          method: POST
          authorizer:
            name: cognitoAuthorizer

  revokeInvite:
    handler: handlers/team.revoke
    events:
      - httpApi:
          path: /api/team/invite/{token}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  removeTeamMember:
    handler: handlers/team.remove
    events:
      - httpApi:
          path: /api/team/{email}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  validateInvite:
    handler: handlers/team.validate
    events:
      - httpApi:
          path: /api/team/invite/{token}/validate
          method: GET

  listRoles:
    handler: handlers/roles.list
    events:
      - httpApi:
          path: /api/roles
          method: GET
          authorizer:
            name: cognitoAuthorizer

  createRole:
    handler: handlers/roles.create
    events:
      - httpApi:
          path: /api/roles
          method: POST
          authorizer:
            name: cognitoAuthorizer

  updateRole:
    handler: handlers/roles.update
    events:
      - httpApi:
          path: /api/roles/{name}
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  deleteRole:
    handler: handlers/roles.remove
    events:
      - httpApi:
          path: /api/roles/{name}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  assignRole:
    handler: handlers/roles.assign
    events:
      - httpApi:
          path: /api/roles/assign
          method: POST
          authorizer:
            name: cognitoAuthorizer

  getPhotoUploadUrl:
    handler: handlers/photos.getUploadUrl
    events:
      - httpApi:
          path: /api/estimates/{id}/photos
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  getPhotoUrls:
    handler: handlers/photos.getPhotoUrls
    events:
      - httpApi:
          path: /api/estimates/{id}/photos
          method: GET
          authorizer:
            name: cognitoAuthorizer

  deletePhoto:
    handler: handlers/photos.deletePhoto
    events:
      - httpApi:
          path: /api/estimates/{id}/photos/{key}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  reportsDashboard:
    handler: handlers/reports.dashboard
    events:
      - httpApi:
          path: /api/reports/dashboard
          method: GET
          authorizer:
            name: cognitoAuthorizer

  listNotifications:
    handler: handlers/notifications.list
    events:
      - httpApi:
          path: /api/notifications
          method: GET
          authorizer:
            name: cognitoAuthorizer

  markNotificationsRead:
    handler: handlers/notifications.markRead
    events:
      - httpApi:
          path: /api/notifications/read
          method: POST
          authorizer:
            name: cognitoAuthorizer

  emailForwarder:
    handler: handlers/email-forwarder.handler
    timeout: 30

  trialReminder:
    handler: handlers/trial-reminder.handler
    timeout: 30
    # DISABLED until physical mailing address is set up (CAN-SPAM compliance)
    # Uncomment when virtual mailbox is active
    # events:
    #   - schedule: rate(1 day)

  dailyDigest:
    handler: handlers/daily-digest.handler
    timeout: 60
    events:
      # 10:00 UTC = 6 AM EDT (summer) / 5 AM EST (winter). Internal owner report,
      # not customer email, so no CAN-SPAM gate. Switch to cron(0 11 ...) for 6 AM EST year-round.
      - schedule:
          rate: cron(0 10 * * ? *)
          enabled: true

  marketRollup:
    handler: handlers/market-rollup.handler
    timeout: 120
    events:
      # Nightly, before the 10:00 UTC owner digest, so future digest versions
      # can read fresh aggregates. Builds anonymized regional pricing
      # benchmarks (MARKET#<regionKey> items) from estimate outcomes.
      - schedule:
          rate: cron(0 9 * * ? *)
          enabled: true

  stripeWebhook:
    handler: handlers/webhook.handler
    events:
      - httpApi:
          path: /api/stripe-webhook
          method: POST

resources:
  Resources:
    FenceCalcTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: fencecalc-${sls:stage}
        AutoVerifiedAttributes:
          - email
        UsernameAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 10
            RequireLowercase: true
            RequireUppercase: true
            RequireNumbers: true
            RequireSymbols: false
        Schema:
          - Name: companyName
            AttributeDataType: String
            Mutable: true
          - Name: inviteToken
            AttributeDataType: String
            Mutable: true

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: fencecalc-client-${sls:stage}
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_PASSWORD_AUTH
        GenerateSecret: false
        PreventUserExistenceErrors: ENABLED

    AssetsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.assetsBucket}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        # Browser uploads PUT directly to presigned URLs; S3 only answers the
        # CORS preflight if the bucket itself has CORS rules. Origins mirror
        # provider.httpApi.cors.allowedOrigins.
        CorsConfiguration:
          CorsRules:
            - AllowedMethods: [PUT, GET]
              AllowedOrigins:
                - 'https://fencetrace.com'
                - 'https://www.fencetrace.com'
                - 'http://ravenwingllc-frontend-dev.s3-website-us-east-1.amazonaws.com'
                - 'http://ravenwing-frontend.s3-website-us-east-1.amazonaws.com'
              AllowedHeaders: ['*']
              MaxAge: 3600

  Outputs:
    UserPoolId:
      Value: !Ref CognitoUserPool
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
    ApiUrl:
      Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

plugins:
  - serverless-finch
