org: portertoddc
service: ravenwingllc

custom:
  bucketMap:
    dev: 'ravenwingllc-frontend-dev'
    prod: 'ravenwing-frontend'
  folderMap:
    dev: 'client/preview'
    prod: 'client/dist'
  client:
    bucketName: ${self:custom.bucketMap.${sls:stage}}
    distributionFolder: ${self:custom.folderMap.${sls:stage}}
  tableName: fencecalc-${sls:stage}
  assetsBucket: fencecalc-assets-${sls:stage}

package:
  excludeDevDependencies: true
  patterns:
    - '!android/**'
    - '!client/**'
    - '!tests/**'
    - '!coverage/**'
    - '!node_modules/.bin/**'
    - '!node_modules/*/test/**'
    - '!node_modules/*/tests/**'
    - '!node_modules/*/docs/**'
    - '!node_modules/**/README*'
    - '!node_modules/**/*.md'
    - '!node_modules/**/*.d.ts'
    - '!node_modules/**/LICENSE*'
    - '!node_modules/**/CHANGELOG*'
    - '!.serverless/**'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  timeout: 15

  stackTags:
    Project: RavenWingLLC
    OwnerContact: Porter

  deploymentBucket:
    name: "ravenwingllc-deployment"
    serverSideEncryption: AES256

  environment:
    DYNAMODB_TABLE: ${self:custom.tableName}
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
    ASSETS_BUCKET: ${self:custom.assetsBucket}
    STRIPE_SECRET_KEY: ${ssm:fencecalc.${sls:stage}.stripe-secret-key, ''}
    STRIPE_WEBHOOK_SECRET: ${ssm:fencecalc.${sls:stage}.stripe-webhook-secret, ''}
    STRIPE_PRICE_ID: ${ssm:fencecalc.${sls:stage}.stripe-price-id, ''}
    STRIPE_PRICE_SOLO: ${ssm:fencecalc.${sls:stage}.stripe-price-solo, ''}
    STRIPE_PRICE_PRO: ${ssm:fencecalc.${sls:stage}.stripe-price-pro, ''}
    STRIPE_PRICE_TEAM: ${ssm:fencecalc.${sls:stage}.stripe-price-team, ''}

  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}'
        audience:
          - !Ref CognitoUserPoolClient

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt FenceCalcTable.Arn
            - !Sub '${FenceCalcTable.Arn}/index/*'
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - !Sub 'arn:aws:s3:::${self:custom.assetsBucket}/*'
            - 'arn:aws:s3:::fencetrace-email-us-east-1/*'
        - Effect: Allow
          Action:
            - ses:SendRawEmail
          Resource: '*'

functions:
  postConfirmation:
    handler: handlers/auth.postConfirmation

  getCompany:
    handler: handlers/company.get
    events:
      - httpApi:
          path: /api/company
          method: GET
          authorizer:
            name: cognitoAuthorizer

  updateCompany:
    handler: handlers/company.update
    events:
      - httpApi:
          path: /api/company
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  listEstimates:
    handler: handlers/estimates.list
    events:
      - httpApi:
          path: /api/estimates
          method: GET
          authorizer:
            name: cognitoAuthorizer

  createEstimate:
    handler: handlers/estimates.create
    events:
      - httpApi:
          path: /api/estimates
          method: POST
          authorizer:
            name: cognitoAuthorizer

  getEstimate:
    handler: handlers/estimates.get
    events:
      - httpApi:
          path: /api/estimates/{id}
          method: GET
          authorizer:
            name: cognitoAuthorizer

  updateEstimate:
    handler: handlers/estimates.update
    events:
      - httpApi:
          path: /api/estimates/{id}
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  deleteEstimate:
    handler: handlers/estimates.remove
    events:
      - httpApi:
          path: /api/estimates/{id}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  trashEstimates:
    handler: handlers/estimates.trash
    events:
      - httpApi:
          path: /api/estimates/trash
          method: GET
          authorizer:
            name: cognitoAuthorizer

  restoreEstimate:
    handler: handlers/estimates.restore
    events:
      - httpApi:
          path: /api/estimates/{id}/restore
          method: POST
          authorizer:
            name: cognitoAuthorizer

  shareEstimate:
    handler: handlers/approval.share
    events:
      - httpApi:
          path: /api/estimates/{id}/share
          method: POST
          authorizer:
            name: cognitoAuthorizer

  getPublicEstimate:
    handler: handlers/approval.getPublic
    events:
      - httpApi:
          path: /api/public/estimate/{token}
          method: GET

  respondEstimate:
    handler: handlers/approval.respond
    events:
      - httpApi:
          path: /api/public/estimate/{token}/respond
          method: POST

  billingCheckout:
    handler: handlers/billing.checkout
    events:
      - httpApi:
          path: /api/billing/checkout
          method: POST
          authorizer:
            name: cognitoAuthorizer

  billingPortal:
    handler: handlers/billing.portal
    events:
      - httpApi:
          path: /api/billing/portal
          method: POST
          authorizer:
            name: cognitoAuthorizer

  billingStatus:
    handler: handlers/billing.status
    events:
      - httpApi:
          path: /api/billing/status
          method: GET
          authorizer:
            name: cognitoAuthorizer

  billingExport:
    handler: handlers/billing.exportData
    events:
      - httpApi:
          path: /api/billing/export
          method: GET
          authorizer:
            name: cognitoAuthorizer

  listTeam:
    handler: handlers/team.list
    events:
      - httpApi:
          path: /api/team
          method: GET
          authorizer:
            name: cognitoAuthorizer

  inviteTeam:
    handler: handlers/team.invite
    events:
      - httpApi:
          path: /api/team/invite
          method: POST
          authorizer:
            name: cognitoAuthorizer

  revokeInvite:
    handler: handlers/team.revoke
    events:
      - httpApi:
          path: /api/team/invite/{token}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  removeTeamMember:
    handler: handlers/team.remove
    events:
      - httpApi:
          path: /api/team/{email}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  validateInvite:
    handler: handlers/team.validate
    events:
      - httpApi:
          path: /api/team/invite/{token}/validate
          method: GET

  listRoles:
    handler: handlers/roles.list
    events:
      - httpApi:
          path: /api/roles
          method: GET
          authorizer:
            name: cognitoAuthorizer

  createRole:
    handler: handlers/roles.create
    events:
      - httpApi:
          path: /api/roles
          method: POST
          authorizer:
            name: cognitoAuthorizer

  updateRole:
    handler: handlers/roles.update
    events:
      - httpApi:
          path: /api/roles/{name}
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  deleteRole:
    handler: handlers/roles.remove
    events:
      - httpApi:
          path: /api/roles/{name}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  assignRole:
    handler: handlers/roles.assign
    events:
      - httpApi:
          path: /api/roles/assign
          method: POST
          authorizer:
            name: cognitoAuthorizer

  getPhotoUploadUrl:
    handler: handlers/photos.getUploadUrl
    events:
      - httpApi:
          path: /api/estimates/{id}/photos
          method: PUT
          authorizer:
            name: cognitoAuthorizer

  deletePhoto:
    handler: handlers/photos.deletePhoto
    events:
      - httpApi:
          path: /api/estimates/{id}/photos/{key}
          method: DELETE
          authorizer:
            name: cognitoAuthorizer

  reportsDashboard:
    handler: handlers/reports.dashboard
    events:
      - httpApi:
          path: /api/reports/dashboard
          method: GET
          authorizer:
            name: cognitoAuthorizer

  listNotifications:
    handler: handlers/notifications.list
    events:
      - httpApi:
          path: /api/notifications
          method: GET
          authorizer:
            name: cognitoAuthorizer

  markNotificationsRead:
    handler: handlers/notifications.markRead
    events:
      - httpApi:
          path: /api/notifications/read
          method: POST
          authorizer:
            name: cognitoAuthorizer

  emailForwarder:
    handler: handlers/email-forwarder.handler
    timeout: 30

  stripeWebhook:
    handler: handlers/webhook.handler
    events:
      - httpApi:
          path: /api/stripe-webhook
          method: POST

resources:
  Resources:
    FenceCalcTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: fencecalc-${sls:stage}
        AutoVerifiedAttributes:
          - email
        UsernameAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireUppercase: false
            RequireNumbers: true
            RequireSymbols: false
        Schema:
          - Name: companyName
            AttributeDataType: String
            Mutable: true
          - Name: inviteToken
            AttributeDataType: String
            Mutable: true

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: fencecalc-client-${sls:stage}
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_PASSWORD_AUTH
        GenerateSecret: false
        PreventUserExistenceErrors: ENABLED

    AssetsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.assetsBucket}

  Outputs:
    UserPoolId:
      Value: !Ref CognitoUserPool
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
    ApiUrl:
      Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

plugins:
  - serverless-finch
